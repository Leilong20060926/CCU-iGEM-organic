<style>
:root{
  --paper:#EDE8D8;
  --paper-deep:#E2DBC4;
  --ink:#332C1C;
  --ink-soft:#8A7E5E;
  --line:#DCD2AE;
  --surface:#F6F2E4;

  --organic:#7A8C3A;
  --organic-soft:#E7EBD5;
  --friendly:#C4732A;
  --friendly-soft:#F5E2CD;
  --both:#2D8B9E;
  --both-soft:#DFEEF0;

  --seal:#B8860B;
  --seal-soft:#F2E6C4;

  --rice:#D4A843;
  --grain:#B8860B;
  --veg:#7A8C3A;
  --fruit:#C4732A;
  --processed:#3FA0AF;
  --other:#9C8B5E;

  --gold-bright:#E8C060;

  --radius-card:14px;
  --shadow:0 6px 18px rgba(51,44,28,.10);
}
*{box-sizing:border-box;}
html{
  scrollbar-gutter:stable;
  overflow-y:scroll;
}
html,body{margin:0;padding:0;}
body{
  background:var(--paper-deep);
  color:var(--ink);
  font-family:'Noto Sans TC','Noto Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Noto Serif TC',serif;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img,svg{display:block;}
.hide{display:none !important;}

/* ---------- layout shell ---------- */
/* Fixed page frame: keeps banner / content / footer aligned to the exact
   same column on every page, regardless of how short or long the content is,
   so desktop viewing has one consistent position rather than content
   floating loosely in the middle of a wide screen. */
#app{
  min-height:100vh;display:flex;flex-direction:column;
  max-width:1240px;margin:0 auto;background:var(--paper);
  box-shadow:0 0 60px rgba(51,44,28,.08);
}
.container{max-width:1080px;margin:0 auto;padding:0 32px;width:100%;}
@media (max-width:720px){
  .container{padding:0 18px;}
  .banner-inner{padding:12px 18px;}
}

/* ---------- banner ---------- */
.banner{
  position:sticky;top:0;z-index:60;
  background:linear-gradient(180deg,var(--paper) 0%,var(--paper) 92%,rgba(245,241,228,0));
  background-color:var(--paper);
  border-bottom:1px solid var(--line);
}
.banner-inner{
  max-width:1080px;margin:0 auto;padding:14px 32px;
  display:flex;align-items:center;gap:18px;
}
.brand{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
.brand .name{line-height:1.05;}
.brand .name .zh{font-size:19px;font-weight:700;display:block;}
.brand .name .en{font-size:10.5px;letter-spacing:.14em;color:var(--ink-soft);text-transform:uppercase;}

.seal{
  width:42px;height:42px;border-radius:50%;
  border:2.5px solid var(--seal);
  display:flex;align-items:center;justify-content:center;
  position:relative;flex:0 0 auto;
  transform:rotate(-6deg);
  color:var(--seal);
  font-family:'Noto Serif TC',serif;font-weight:900;font-size:16px;
  box-shadow:inset 0 0 0 2px rgba(166,64,44,.18);
}
.brand-logo{
  width:42px;height:42px;border-radius:50%;
  object-fit:cover;border:2.5px solid var(--seal);
  display:block;flex:0 0 auto;transform:rotate(-6deg);
}
.seal::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1px dashed rgba(166,64,44,.45);
}

.banner-links{display:flex;align-items:center;gap:4px;margin-left:auto;flex-wrap:wrap;}
.banner-links button, .banner-links .navlink{
  font-size:14px;padding:8px 12px;border-radius:20px;color:var(--ink-soft);
  white-space:nowrap;
}
.banner-links button:hover,.banner-links .navlink:hover{background:var(--paper-deep);color:var(--ink);}
.icon-btn{
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--line);
}
.icon-btn:hover{background:var(--paper-deep);}
.lang-toggle{
  font-size:12px;font-weight:700;letter-spacing:.05em;
  border:1px solid var(--line);border-radius:20px;padding:7px 12px;background:var(--surface);
}

.search-wrap{position:relative;}
.search-bar{position:relative;display:flex;align-items:center;}
.search-bar .icon{position:absolute;left:13px;font-size:13px;color:var(--ink-soft);pointer-events:none;}
.search-input{
  width:190px;padding:9px 14px 9px 34px;border-radius:24px;border:1.5px solid var(--line);
  background:var(--surface);font-size:13.5px;color:var(--ink);
}
.search-input::placeholder{color:var(--ink-soft);}
.search-input:focus{outline:none;border-color:var(--both);box-shadow:0 0 0 3px var(--both-soft);}
@media (max-width:640px){
  .search-input{width:120px;}
}
.search-panel{
  position:absolute;top:48px;right:0;width:min(360px,88vw);
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  box-shadow:var(--shadow);padding:10px;z-index:70;
}
.search-results{margin-top:8px;max-height:300px;overflow:auto;}
.search-result-item{
  display:flex;gap:10px;align-items:center;padding:8px 6px;border-radius:8px;
}
.search-result-item:hover{background:var(--paper-deep);}
.search-empty{font-size:13px;color:var(--ink-soft);padding:8px 6px;}

/* ---------- main ---------- */
main{flex:1;padding:26px 0 60px;}

.crumb-back{
  display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--ink-soft);
  padding:6px 4px;margin-bottom:14px;
}
.crumb-back:hover{color:var(--ink);}

.page-title{font-size:26px;font-weight:700;margin:2px 0 4px;}
.page-sub{font-size:13px;color:var(--ink-soft);margin:0 0 22px;}

/* ---------- home hero ---------- */
.hero{
  display:flex;align-items:center;justify-content:space-between;gap:26px;
  padding:26px 0 30px;border-bottom:1px solid var(--line);margin-bottom:26px;flex-wrap:wrap;
}
.hero-copy h1{font-size:clamp(26px,4vw,38px);margin:0 0 10px;line-height:1.25;}
.hero-copy p{font-size:14.5px;color:var(--ink-soft);max-width:480px;margin:0;}
.hero-stamp{
  width:118px;height:118px;border-radius:50%;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;text-align:center;
  border:3px solid var(--seal);color:var(--seal);transform:rotate(6deg);
  font-family:'Noto Serif TC',serif;font-weight:900;font-size:15px;line-height:1.3;
  position:relative;
}
.hero-stamp::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px dashed rgba(166,64,44,.4);}

.map-cta{
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  background:var(--both-soft);border:1px solid var(--both);border-radius:var(--radius-card);
  padding:16px 20px;margin-bottom:30px;
}
.map-cta .t1{font-weight:700;font-size:15.5px;}
.map-cta .t2{font-size:12.5px;color:var(--ink-soft);}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:22px;
  background:var(--ink);color:var(--paper);font-size:14px;font-weight:600;white-space:nowrap;
}
.btn:hover{opacity:.88;}
.btn.outline{background:transparent;color:var(--both);border:1.5px solid var(--both);}

/* ---------- grids ---------- */
.section-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 12px;font-weight:700;}
.grid{display:grid;gap:16px;}
.grid.cat{grid-template-columns:repeat(3,1fr);}
.grid.sub{grid-template-columns:repeat(4,1fr);}
.grid.prod{grid-template-columns:repeat(4,1fr);}
@media (max-width:860px){
  .grid.cat{grid-template-columns:repeat(2,1fr);}
  .grid.sub{grid-template-columns:repeat(3,1fr);}
  .grid.prod{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:520px){
  .grid.cat{grid-template-columns:repeat(2,1fr);}
  .grid.sub{grid-template-columns:repeat(2,1fr);}
  .grid.prod{grid-template-columns:repeat(2,1fr);}
  .banner-links .navlink.hide-mobile{display:none;}
}

.tile{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-card);
  padding:18px 14px;text-align:center;position:relative;overflow:hidden;
  transition:transform .15s ease, box-shadow .15s ease;
}
.tile:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.tile .icon{font-size:34px;margin-bottom:8px;}
.tile .zh{font-weight:700;font-size:14.5px;}
.tile .en{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;}
.tile .catbar{position:absolute;left:0;top:0;bottom:0;width:5px;}
.tile.optional::before{
  content:attr(data-opt);position:absolute;top:8px;right:10px;font-size:9.5px;color:var(--ink-soft);
  background:var(--paper-deep);padding:2px 6px;border-radius:8px;
}

.tag{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;letter-spacing:.02em;
}
.tag.organic{background:var(--organic-soft);color:var(--organic);}
.tag.friendly{background:var(--friendly-soft);color:var(--friendly);}
.tag.both{background:var(--both-soft);color:var(--both);}
.tag-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

.prod-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-card);
  padding:14px;position:relative;
}
.prod-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.prod-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.prod-card .icon{font-size:30px;}
.prod-card .zh{font-weight:700;font-size:14.5px;margin:2px 0 1px;}
.prod-card .en{font-size:10.5px;color:var(--ink-soft);}
.prod-card .price{font-size:13px;margin-top:8px;font-weight:600;}
.prod-card .vendor{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}

.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-chip{
  padding:7px 14px;border-radius:20px;border:1px solid var(--line);font-size:12.5px;font-weight:600;
  background:var(--surface);color:var(--ink-soft);
}
.filter-chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* ---------- product detail (game-card style) ---------- */
.detail-wrap{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start;}
.game-card{
  width:320px;flex:0 0 320px;background:var(--surface);
  border:3px solid var(--ink);border-radius:22px;padding:0;overflow:hidden;
  box-shadow:8px 8px 0 rgba(51,44,28,.12);
}
.game-card .head{
  background:var(--ink);color:var(--paper);padding:14px 18px;text-align:center;
}
.game-card .head .zh{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;}
.game-card .head .en{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;opacity:.75;}
.game-card .art{
  height:140px;display:flex;align-items:center;justify-content:center;font-size:64px;
  background:repeating-linear-gradient(135deg,var(--paper-deep),var(--paper-deep) 10px, var(--paper) 10px, var(--paper) 20px);
  border-bottom:2px dashed var(--line);position:relative;
}
.game-card .tagrow{position:absolute;top:10px;left:10px;display:flex;gap:6px;}
.game-card .body{padding:16px 18px 18px;}
.stat-line{display:flex;justify-content:space-between;font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--line);}
.stat-line:last-child{border-bottom:none;}
.stat-line .k{color:var(--ink-soft);}
.stat-line .v{font-weight:700;text-align:right;}

.info-col{flex:1 1 380px;min-width:280px;}
.info-block{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-card);
  padding:18px 20px;margin-bottom:16px;
}
.info-block h3{font-size:14px;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.cert-seal{
  width:30px;height:30px;border-radius:50%;border:2px solid var(--seal);color:var(--seal);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;transform:rotate(-8deg);
}
.kv{display:grid;grid-template-columns:110px 1fr;gap:8px 10px;font-size:13px;}
.kv .k{color:var(--ink-soft);}
.kv .v{font-weight:600;}
.trace-code{
  display:inline-block;margin-top:4px;padding:5px 10px;background:var(--paper-deep);border-radius:6px;
  font-size:12.5px;letter-spacing:.02em;
}
.season-strip{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:6px;}
.season-cell{
  aspect-ratio:1;border-radius:5px;background:var(--paper-deep);display:flex;align-items:center;justify-content:center;
  font-size:9.5px;color:var(--ink-soft);
}
.season-cell.on{background:var(--organic);color:#fff;font-weight:700;}
.pct-bar{height:10px;border-radius:6px;background:var(--paper-deep);overflow:hidden;margin-top:6px;}
.pct-bar-fill{height:100%;background:var(--processed);}
.vendor-link{
  display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--both);
  border-bottom:1.5px dashed var(--both);padding-bottom:1px;
}
.mini-map-btn{
  display:flex;align-items:center;gap:12px;background:var(--paper-deep);border-radius:10px;padding:12px 14px;
  cursor:pointer;
}
.mini-map-btn:hover{background:var(--line);}

/* ---------- map page ---------- */
.map-layout{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start;}
.map-svg-wrap{
  flex:0 0 auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-card);
  padding:14px;position:relative;
}
.map-caption{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:6px;}
.marker{cursor:pointer;}
.marker circle.pulse{opacity:.35;}
.marker:hover circle.dot{stroke:var(--ink);stroke-width:1.5px;}
.map-legend{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.vendor-list{flex:1 1 320px;min-width:280px;}
.vendor-row{
  background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
}
.vendor-row.highlight{border-color:var(--seal);box-shadow:0 0 0 2px var(--seal-soft);}
.vendor-row .name{font-weight:700;font-size:13.5px;}
.vendor-row .county{font-size:11.5px;color:var(--ink-soft);}
.vendor-row .products{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.gmap-link{font-size:12px;color:var(--both);font-weight:700;white-space:nowrap;}

/* ---------- vendor page ---------- */
.vendor-header{display:flex;gap:16px;align-items:center;margin-bottom:20px;}
.vendor-avatar{
  width:64px;height:64px;border-radius:50%;background:var(--organic-soft);color:var(--organic);
  display:flex;align-items:center;justify-content:center;font-size:26px;flex:0 0 auto;
}

/* ---------- about / info pages ---------- */
.prose{font-size:14.5px;line-height:1.9;color:var(--ink-soft);}
.prose h3{color:var(--ink);font-size:15.5px;margin:22px 0 8px;}
.prose a{color:var(--both);font-weight:700;}
.link-card{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin:10px 0;
}

footer{border-top:1px solid var(--line);padding:22px 0;text-align:center;font-size:11.5px;color:var(--ink-soft);}
</style>
</head>

function tagLabel(tag){
  if(tag==="organic") return t("organic");

function toggleLang(){ state.lang = state.lang==='zh'?'en':'zh'; render(); }
function openSearchResults(){
  if(!state.searchOpen){
    state.searchOpen = true;
    const q = state.searchQ;
    render();
    const el = document.getElementById('searchInput');
    if(el){ el.value = q; el.focus(); el.setSelectionRange(q.length, q.length); }
  }
  renderSearchResults();
}
function onSearchInput(v){
  state.searchQ = v;
  if(!state.searchOpen){ openSearchResults(); return; }
  renderSearchResults();
}
function renderSearchResults(){
  const box = document.getElementById("searchResults");
  if(!box) return;
  const q = state.searchQ.trim().toLowerCase();
  if(!q){ box.innerHTML = `<div class="search-empty">${t('searchPh')}</div>`; return; }
  const results = P.filter(p=> p.name.zh.toLowerCase().includes(q) || p.name.en.toLowerCase().includes(q));
  if(!results.length){ box.innerHTML = `<div class="search-empty">${t('noResult')}</div>`; return; }
  box.innerHTML = results.slice(0,8).map(p=>`
    <a href="#" class="search-result-item" onclick="nav('detail',{id:'${p.id}'});return false;">
      <span style="font-size:22px;">${p.icon}</span>
      <span>
        <div style="font-weight:700;font-size:13.5px;">${p.name.zh} <span style="font-weight:400;color:var(--ink-soft);font-size:11px;">${p.name.en}</span></div>
        ${tagChip(p.tag)}
      </span>
    </a>
  `).join("");
}
document.addEventListener("click", (e)=>{
  const wrap = document.querySelector(".search-wrap");
  if(wrap && state.searchOpen && !wrap.contains(e.target)){
    state.searchOpen = false; render();
  }
});

    <h2 class="page-title">${cat.zh} <span style="font-weight:400;font-size:15px;color:var(--ink-soft);">${cat.en}</span></h2>

    <div class="grid sub">
      ${subs.map(s=>`
        <a href="#" class="tile" onclick="nav('products',{cat:'${cat.id}',sub:'${s.id}'});return false;">
          <span class="catbar" style="background:${cat.color}"></span>
          <div class="icon">${s.icon}</div>
          <div class="zh">${s.zh}</div>
          <div class="en">${s.en}</div>
        </a>
      `).join("")}
    </div>
  `;
}

/* ======================================================================
   RENDER: PRODUCT LIST
   ====================================================================== */
function setFilter(f){ state.filter = f; render(); }
function renderProducts(){
  const cat = catOf(state.params.cat);
  const sub = state.params.sub ? subOf(cat.id, state.params.sub) : null;
  let list = productsOf(cat.id, state.params.sub);
  if(state.filter !== "all"){ list = list.filter(p=>p.tag===state.filter); }
  const backTarget = cat.hasSub ? `nav('sub',{cat:'${cat.id}'})` : `nav('home')`;
  return `
    <a href="#" class="crumb-back" onclick="${backTarget};return false;">← ${t('back')}</a>
    <h2 class="page-title">${sub?sub.zh:cat.zh} <span style="font-weight:400;font-size:15px;color:var(--ink-soft);">${sub?sub.en:cat.en}</span></h2>
    <p class="page-sub">${list.length} ${t('productsIn')}</p>
    <div class="filter-row">
      <button class="filter-chip ${state.filter==='all'?'active':''}" onclick="setFilter('all')">${t('all')}</button>
      <button class="filter-chip ${state.filter==='organic'?'active':''}" onclick="setFilter('organic')">${t('organic')}</button>
      <button class="filter-chip ${state.filter==='friendly'?'active':''}" onclick="setFilter('friendly')">${t('friendly')}</button>
      <button class="filter-chip ${state.filter==='both'?'active':''}" onclick="setFilter('both')">${t('both')}</button>
    </div>
    <div class="grid prod">
      ${list.map(p=>{
        const v = vendorOf(p.vendorId);
        return `
        <a href="#" class="prod-card" onclick="nav('detail',{id:'${p.id}'});return false;">
          <div class="top">
            <span class="icon">${p.icon}</span>
            ${tagChip(p.tag)}
          </div>
          <div class="zh">${p.name.zh}</div>
          <div class="en">${p.name.en}</div>
          <div class="price">NT$ ${p.price} <span style="font-weight:400;color:var(--ink-soft);font-size:11.5px;">/ ${tv(p.unit)}</span></div>
          <div class="vendor">${tv(v)}</div>
        </a>`;
      }).join("") || `<div class="search-empty">${t('noResult')}</div>`}
    </div>
  `;
}

/* ======================================================================
   RENDER: PRODUCT DETAIL
   ====================================================================== */
function renderDetail(){
  const p = productById(state.params.id);
  const v = vendorOf(p.vendorId);
  const cat = catOf(p.cat);
  return `
    <a href="#" class="crumb-back" onclick="nav('products',{cat:'${p.cat}',sub:'${p.sub||''}'});return false;">← ${t('back')}</a>
    <div class="detail-wrap">
      <div class="game-card">
        <div class="head">
          <div class="zh">${p.name.zh}</div>
          <div class="en">${p.name.en}</div>
        </div>
        <div class="art">
          <div class="tagrow">${tagChip(p.tag)}</div>
          ${p.icon}
        </div>
        <div class="body">
          <div class="stat-line"><span class="k">${t('vendor')}</span>
            <span class="v"><a href="#" class="vendor-link" onclick="nav('vendor',{id:'${v.id}'});return false;">${tv(v)}</a></span></div>
          <div class="stat-line"><span class="k">${t('price')}</span><span class="v">NT$ ${p.price} / ${tv(p.unit)}</span></div>
          <div class="stat-line"><span class="k">${t('certExpiry')}</span><span class="v mono">${p.cert.expiry}</span></div>
        </div>
      </div>

      <div class="info-col">
        <div class="info-block">
          <h3><span class="cert-seal">證</span>${t('certBlock')}</h3>
          <div class="kv">
            <div class="k">${t('certNo')}</div><div class="v mono">${p.cert.no}</div>
            <div class="k">${t('certAgency')}</div><div class="v">${tv(p.cert.agency)}</div>
            <div class="k">${t('certExpiry')}</div><div class="v mono">${p.cert.expiry}</div>
          </div>
        </div>

        <div class="info-block">
          <h3>🔗 ${t('traceCode')}</h3>
          <div class="trace-code mono">${p.trace}</div>
          <p style="font-size:12px;color:var(--ink-soft);margin:10px 0 0;">${t('traceNote')}</p>
        </div>

        <div class="info-block">
          <h3>📅 ${t('season')}</h3>
          <div class="season-strip">
            ${M.map(m=>`<div class="season-cell ${p.season.includes(m)?'on':''}">${m}</div>`).join("")}
          </div>
        </div>

        ${p.processedPct ? `
        <div class="info-block">
          <h3>🧪 ${t('processedPct')}</h3>
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;">
            <span>${p.processedPct}%</span>
          </div>
          <div class="pct-bar"><div class="pct-bar-fill" style="width:${p.processedPct}%"></div></div>
        </div>` : ``}

        <div class="info-block">
          <h3>📍 ${t('mapBlock')}</h3>
          <p style="font-size:12px;color:var(--ink-soft);margin:0 0 10px;">${t('mapBlockSub')}</p>
          <div class="mini-map-btn" onclick="nav('map',{vendor:'${v.id}'})">
            <span style="font-size:22px;">🗺️</span>
            <span style="font-size:13px;font-weight:600;">${tv(v.county)} · ${tv(v)}</span>
            <span style="margin-left:auto;color:var(--both);font-weight:700;font-size:12.5px;">${t('viewMap')}</span>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ======================================================================
   RENDER: VENDOR
   ====================================================================== */
function renderVendor(){
  const v = vendorOf(state.params.id);
  const others = P.filter(p=>p.vendorId===v.id);
  return `
    <a href="#" class="crumb-back" onclick="history.back();return false;">← ${t('back')}</a>
    <div class="vendor-header">
      <div class="vendor-avatar">🌱</div>
      <div>
        <h2 class="page-title" style="margin-bottom:2px;">${tv(v)}</h2>
        <p class="page-sub" style="margin:0;">${tv(v.county)}</p>
      </div>
    </div>
    <div class="info-block">
      <div class="kv">
        <div class="k">${t('phone')}</div><div class="v mono">${v.phone}</div>
        <div class="k">${t('address')}</div><div class="v">${tv(v.addr)}</div>
      </div>
    </div>
    <div class="section-label">${t('otherProducts')}</div>
    <div class="grid prod">
      ${others.map(p=>`
        <a href="#" class="prod-card" onclick="nav('detail',{id:'${p.id}'});return false;">
          <div class="top"><span class="icon">${p.icon}</span>${tagChip(p.tag)}</div>
          <div class="zh">${p.name.zh}</div>
          <div class="en">${p.name.en}</div>
          <div class="price">NT$ ${p.price} <span style="font-weight:400;color:var(--ink-soft);font-size:11.5px;">/ ${tv(p.unit)}</span></div>
        </a>
      `).join("")}
    </div>
  `;
}

/* ======================================================================
   RENDER: MAP
   ====================================================================== */
const LEGEND = [
  {id:"rice",color:"var(--rice)"},{id:"grain",color:"var(--grain)"},{id:"veg",color:"var(--veg)"},
  {id:"fruit",color:"var(--fruit)"},{id:"processed",color:"var(--processed)"},{id:"other",color:"var(--other)"},
];
function vendorCatColor(vendorId){
  const cats = [...new Set(P.filter(p=>p.vendorId===vendorId).map(p=>p.cat))];
  const c = catOf(cats[0]);
  return c ? c.color : "var(--other)";
}
function vendorCats(vendorId){
  return [...new Set(P.filter(p=>p.vendorId===vendorId).map(p=>p.cat))].map(id=>catOf(id));
}
function selectVendor(id){ state.highlightVendor = id; render(); }
function renderMap(){
  if(state.params.vendor) state.highlightVendor = state.params.vendor;
  const islandPath = "M170,18 C205,32 214,58 206,84 C232,120 226,190 202,236 C214,278 202,332 182,368 C190,414 172,470 156,512 C148,548 142,570 137,588 C120,566 100,536 100,504 C82,470 90,432 76,398 C60,362 72,318 62,282 C50,246 66,206 58,166 C74,124 100,84 96,58 C112,36 142,20 170,18 Z";
  return `
    <a href="#" class="crumb-back" onclick="nav('home');return false;">← ${t('backHome')}</a>
    <h2 class="page-title">${t('mapTitle')}</h2>
    <p class="page-sub">${t('mapSub')}</p>
    <div class="map-legend">
      ${LEGEND.map(l=>`<span class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${catOf(l.id).zh} ${catOf(l.id).en}</span>`).join("")}
    </div>
    <div class="map-layout">
      <div class="map-svg-wrap">
        <svg width="260" height="620" viewBox="0 0 260 620">
          <path d="${islandPath}" fill="var(--paper-deep)" stroke="var(--line)" stroke-width="2"/>
          ${VENDORS.map(v=>{
            const color = vendorCatColor(v.id);
            const active = state.highlightVendor===v.id;
            return `
            <g class="marker" onclick="selectVendor('${v.id}')">
              <circle class="pulse" cx="${v.x}" cy="${v.y}" r="${active?13:9}" fill="${color}"></circle>
              <circle class="dot" cx="${v.x}" cy="${v.y}" r="5.5" fill="${color}" stroke="${active?'var(--ink)':'var(--surface)'}" stroke-width="${active?2:1.5}"></circle>
            </g>`;
          }).join("")}
        </svg>
        <div class="map-caption">${t('mapSub')}</div>
      </div>
      <div class="vendor-list">
        <div class="section-label">${t('vendorListTitle')}</div>
        ${VENDORS.map(v=>{
          const cats = vendorCats(v.id);
          const gmapQ = encodeURIComponent(tv(v)+" "+tv(v.addr));
          return `
          <div class="vendor-row ${state.highlightVendor===v.id?'highlight':''}" onclick="selectVendor('${v.id}')">
            <div>
              <div class="name">${tv(v)}</div>
              <div class="county">${tv(v.county)}</div>
              <div class="products">${cats.map(c=>c.zh).join("・")}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
              <a href="#" class="gmap-link" onclick="event.stopPropagation();nav('vendor',{id:'${v.id}'});return false;">${t('vendorInfoTitle')} →</a>
              <a class="gmap-link" href="https://www.google.com/maps/search/?api=1&query=${gmapQ}" target="_blank" rel="noopener" onclick="event.stopPropagation();">${t('openGmap')}</a>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

/* ======================================================================
   RENDER: ABOUT / INFO
   ====================================================================== */
function renderAbout(){
  return `
    <a href="#" class="crumb-back" onclick="nav('home');return false;">← ${t('backHome')}</a>
    <h2 class="page-title">${t('aboutTitle')}</h2>
    <div class="prose">
      <h3>${t('aboutIntro')}</h3>
      ${t('aboutBody').split("\n").map(line=>`<p>${line}</p>`).join("")}

      <h3>${t('aboutLinksTitle')}</h3>
      ${ABOUT_LINKS.map(l=>`
        <div class="link-card">
          <span style="display:flex;align-items:center;gap:10px;"><span style="font-size:18px;">${l.icon}</span>${tv(l)}</span>
          <a href="${l.url}" target="_blank" rel="noopener" class="gmap-link">${l.url.replace(/^https?:\/\//,'')} →</a>
        </div>
      `).join("")}
    </div>
  `;
}
function renderInfo(){
  return `
    <a href="#" class="crumb-back" onclick="nav('home');return false;">← ${t('backHome')}</a>
    <h2 class="page-title">${t('infoTitle')}</h2>
    <div class="prose">
      ${INFO_SECTIONS.map(sec=>`
        <h3>${tv(sec)}</h3>
        <ul style="margin:0 0 6px;padding-left:20px;">
          ${sec.points.map(pt=>`<li style="margin-bottom:8px;">${tv(pt)}</li>`).join("")}
        </ul>
      `).join("")}

      <h3>${t('infoBody')}</h3>
      <div class="link-card">
        <span>${t('dbName')}</span>
        <a href="https://epv.afa.gov.tw/" target="_blank" rel="noopener" class="gmap-link">epv.afa.gov.tw →</a>
      </div>
    </div>
  `;
}

/* ======================================================================
   MAIN RENDER
   ====================================================================== */
function render(){
  renderBanner();
  const main = document.getElementById("main");
  switch(state.view){
    case "home": main.innerHTML = renderHome(); break;
    case "sub": main.innerHTML = renderSub(); break;
    case "products": main.innerHTML = renderProducts(); break;
    case "detail": main.innerHTML = renderDetail(); break;
    case "vendor": main.innerHTML = renderVendor(); break;
    case "map": main.innerHTML = renderMap(); break;
    case "about": main.innerHTML = renderAbout(); break;
    case "info": main.innerHTML = renderInfo(); break;
    default: main.innerHTML = renderHome();
  }
}
render();
</script>
